<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="MIRA Terminal">
    <meta property="og:description" content="MIRAの創作・TRPG・ゲーム制作・ツールをまとめる個人ターミナルです。">
    <meta property="og:image" content="https://mira-tr.github.io/mira-terminal/assets/ogp/mira-terminal.png">
    <meta property="og:url" content="https://mira-tr.github.io/mira-terminal/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MIRA Terminal">
    <meta name="twitter:description" content="MIRAの創作・TRPG・ゲーム制作・ツールをまとめる個人ターミナルです。">
    <meta name="twitter:image" content="https://mira-tr.github.io/mira-terminal/assets/ogp/mira-terminal.png">
    <title>MIRA Terminal</title>
    <link rel="stylesheet" href="./trpg/css/style.css">
</head>

<body data-profile-data-url="./data/public-profile.json">
    <header class="site-header">
        <div class="site-header-inner">
            <div>
                <p class="site-label">MIRA Terminal</p>
                <h1 id="profileDisplayName">MIRA Terminal</h1>
                <p id="profileBio" class="site-lead">
                    MIRAの制作活動をまとめる統合プラットフォームです。
                </p>
                <div id="profileActivities" class="profile-activities"></div>
            </div>
            <nav class="header-nav" aria-label="モジュール">
                <a class="nav-item is-current" href="./" aria-current="page">Home</a>
                <a class="nav-item" href="./trpg/">TRPG</a>
                <a class="nav-item" href="./game/">Game</a>
                <a class="nav-item" href="./tools/">Tools</a>
                <a class="nav-item" href="./notes/">Notes</a>
                <a class="nav-item" href="./about/">About</a>
            </nav>
        </div>
    </header>

    <main class="page">
        <section class="search-panel">
            <div class="section-head">
                <div>
                    <p class="section-label">Welcome</p>
                    <h2>MIRA Terminalへようこそ</h2>
                </div>
            </div>

            <div class="modules-grid">
                <a class="module-card" href="./trpg/">
                    <div class="module-card-inner">
                        <h3>TRPG</h3>
                        <p>シナリオライブラリ</p>
                        <span class="module-status">Available</span>
                    </div>
                </a>

                <a class="module-card module-card-coming-soon" href="./game/">
                    <div class="module-card-inner">
                        <h3>Game</h3>
                        <p>ゲーム制作物</p>
                        <span class="module-status">Coming Soon</span>
                    </div>
                </a>

                <a class="module-card module-card-coming-soon" href="./tools/">
                    <div class="module-card-inner">
                        <h3>Tools</h3>
                        <p>制作ツール</p>
                        <span class="module-status">Coming Soon</span>
                    </div>
                </a>

                <a class="module-card module-card-coming-soon" href="./notes/">
                    <div class="module-card-inner">
                        <h3>Notes</h3>
                        <p>制作メモ</p>
                        <span class="module-status">Coming Soon</span>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <small>&copy; MIRA Terminal</small>
    </footer>

    <script type="module" src="./js/profileApi.js"></script>

    <style>
        .profile-activities {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .activity-tag {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(110, 168, 255, 0.18);
            color: var(--color-accent);
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .module-card {
            display: block;
            text-decoration: none;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            background: rgba(7, 13, 26, 0.54);
            transition: border-color 0.2s, background 0.2s;
        }

        .module-card:hover {
            border-color: var(--color-accent);
            background: rgba(110, 168, 255, 0.12);
        }

        .module-card-coming-soon {
            opacity: 0.6;
        }

        .module-card-coming-soon:hover {
            opacity: 0.8;
        }

        .module-card-inner {
            padding: 20px;
        }

        .module-card h3 {
            margin: 0 0 8px 0;
            color: var(--color-accent);
            font-size: 18px;
            font-weight: 800;
        }

        .module-card p {
            margin: 0 0 12px 0;
            color: var(--color-text);
            font-size: 14px;
        }

        .module-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(110, 168, 255, 0.18);
            color: var(--color-accent);
        }

        .module-card-coming-soon .module-status {
            background: rgba(255, 255, 255, 0.08);
            color: var(--color-muted);
        }

        @media (max-width: 560px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</body>
</html>
