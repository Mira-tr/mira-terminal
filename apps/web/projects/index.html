<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RELMUAの代表作品と制作中のプロジェクトを紹介します。">
    <meta property="og:title" content="RELMUA | Projects">
    <meta property="og:description" content="RELMUAの代表作品と制作中のプロジェクトを紹介します。">
    <meta property="og:image" content="https://mira-tr.github.io/mira-terminal/assets/brand/og/og-game.png">
    <meta property="og:url" content="https://mira-tr.github.io/mira-terminal/projects/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RELMUA | Projects">
    <meta name="twitter:description" content="RELMUAの代表作品と制作中のプロジェクトを紹介します。">
    <meta name="twitter:image" content="https://mira-tr.github.io/mira-terminal/assets/brand/og/og-game.png">
    <title>RELMUA | Projects</title>
    <link rel="icon" type="image/png" href="../assets/brand/icon.png">
    <link rel="apple-touch-icon" href="../assets/brand/icon.png">
    <script src="../js/theme.js"></script>
    <link rel="stylesheet" href="../trpg/css/style.css">
    <link rel="stylesheet" href="../css/brand/index.css">
    <link rel="stylesheet" href="./css/projects.css">
</head>

<body class="brand-page">
    <header class="site-header brand-header">
        <div class="site-header-inner">
            <div>
                <a class="site-logo-link" href="../" aria-label="Home">
                    <img class="site-logo" src="../assets/brand/logo.png" alt="RELMUA">
                </a>
            </div>
            <nav class="header-nav" aria-label="主要ページ">
                <a class="nav-item" href="../">ホーム</a>
                <a class="nav-item is-current" href="./" aria-current="page">作品</a>
                <a class="nav-item" href="../tools/">道具</a>
                <a class="nav-item" href="../notes/">記録</a>
                <a class="nav-item" href="../about/">ブランド</a>
                <a class="nav-item" href="../contact/">連絡</a>
            </nav>
        </div>
    </header>

    <main class="page brand-main projects-page">
        <section class="brand-page-heading" aria-labelledby="brandPageTitle">
            <p class="section-label">作品</p>
            <h1 id="brandPageTitle">作品</h1>
            <p>RELMUAの代表作品と制作中のアイデアを、単なる一覧ではなく作品紹介として整理します。</p>
        </section>

        <section class="projects-featured-section" aria-labelledby="featuredProjectTitle">
            <div class="projects-section-header">
                <p class="section-label">注目</p>
                <h2 id="featuredProjectTitle">Featured Project</h2>
            </div>
            <div id="featuredProject" aria-live="polite">
                <div class="projects-empty-state" role="status">
                    <p class="section-label">作品</p>
                    <h3>注目作品を準備しています</h3>
                    <p>公開データを読み込むと、ここに作品が表示されます。</p>
                </div>
            </div>
        </section>

        <section class="projects-grid-section" aria-labelledby="projectsGridTitle">
            <div class="projects-section-header">
                <p class="section-label">一覧</p>
                <h2 id="projectsGridTitle">その他の作品</h2>
                <p>ステータス、タグ、短い概要とともに制作物を辿れます。</p>
            </div>
            <div id="projectsGrid" aria-live="polite"></div>
        </section>
    </main>

    <footer class="site-footer brand-footer">
        <div class="brand-footer__inner">
            <div>
                <p class="brand-footer__title">RELMUA</p>
                <p class="brand-footer__description">RELMUAの作品、道具、記録、活動者を整理して届けます。</p>
            </div>
            <div class="brand-footer__links">
                <nav class="brand-footer__nav" aria-label="フッターナビゲーション">
                    <a href="../projects/">作品</a>
                    <a href="../tools/">道具</a>
                    <a href="../notes/">記録</a>
                    <a href="../about/">ブランド</a>
                    <a href="../contact/">連絡</a>
                </nav>
                <div class="brand-footer__social" aria-label="Social links"></div>
                <small>&copy; RELMUA</small>
            </div>
        </div>
    </footer>

    <script type="module" src="./js/projects.js"></script>
</body>
</html>
