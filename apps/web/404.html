<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RELMUAのページが見つからないときの案内ページです。">
    <meta property="og:title" content="RELMUA">
    <meta property="og:description" content="RELMUAのページが見つからないときの案内ページです。">
    <meta property="og:image" content="https://mira-tr.github.io/mira-terminal/assets/brand/og/og-relmua.svg">
    <meta property="og:url" content="https://mira-tr.github.io/mira-terminal/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RELMUA">
    <meta name="twitter:description" content="RELMUAのページが見つからないときの案内ページです。">

    <title>RELMUA | 404 Not Found</title>
    <link rel="icon" type="image/svg+xml" href="./assets/brand/relmua-icon.svg">
    <link rel="apple-touch-icon" href="./assets/brand/relmua-icon.svg">
    <script src="./js/theme.js"></script>
    <link rel="stylesheet" href="./trpg/css/style.css">
    <link rel="stylesheet" href="./css/brand/index.css">
    <link rel="stylesheet" href="./css/not-found.css">
</head>

<body class="brand-page">
    <header class="site-header brand-header">
        <div class="site-header-inner">
            <div>
                <a class="site-logo-link" href="./" aria-label="Home">
                    <img class="site-logo" src="./assets/brand/relmua-logo.svg" alt="RELMUA">
                </a>
            </div>
            <nav class="header-nav" aria-label="主要ページ">
                <a class="nav-item" href="./">ホーム</a>
                <a class="nav-item" href="./projects/">作品</a>
                <a class="nav-item" href="./tools/">道具</a>
                <a class="nav-item" href="./notes/">記録</a>
                <a class="nav-item" href="./creators/">活動者</a>
                <a class="nav-item" href="./about/">ブランド</a>
                <a class="nav-item" href="./contact/">連絡</a>
            </nav>
        </div>
    </header>

    <main class="page brand-main not-found-page">
        <section class="not-found-panel" aria-labelledby="notFoundTitle">
            <div class="not-found-visual" aria-hidden="true"></div>
            <div>
                <p class="not-found-code" aria-hidden="true">404</p>
                <p class="section-label">未到達</p>
                <h1 id="notFoundTitle">このURLにはページがありません。</h1>
            </div>
            <p class="section-description">リンクが古いか、URLが少し違っているかもしれません。RELMUAの入口から、見たいページへ戻ってください。</p>
            <div class="not-found-actions">
                <a class="brand-button" href="./">ホームへ戻る</a>
                <a class="brand-button brand-button--secondary" href="./projects/">作品を見る</a>
            </div>
        </section>

        <section class="not-found-guide" aria-labelledby="notFoundLinksTitle">
            <div class="brand-section__header">
                <p class="section-label">案内</p>
                <h2 id="notFoundLinksTitle">目的別に探す</h2>
                <p>迷ったときは、Brandの主要ページか活動者ページから入り直せます。</p>
            </div>
            <div class="not-found-links">
                <a class="not-found-link" href="./projects/">作品を探す</a>
                <a class="not-found-link" href="./tools/">道具を探す</a>
                <a class="not-found-link" href="./notes/">記録を読む</a>
                <a class="not-found-link" href="./creators/">活動者を見る</a>
                <a class="not-found-link" href="./about/">ブランドを知る</a>
                <a class="not-found-link" href="./contact/">連絡方法を見る</a>
            </div>
        </section>
    </main>

    <footer class="site-footer brand-footer">
        <div class="brand-footer__inner">
            <div>
                <p class="brand-footer__title">RELMUA</p>
                <p class="brand-footer__description">RELMUAの作品、道具、記録、活動者を整理して届けます。</p>
            </div>
            <div class="brand-footer__links">
                <nav class="brand-footer__nav" aria-label="フッターナビゲーション">
                    <a href="./projects/">作品</a>
                    <a href="./tools/">道具</a>
                    <a href="./notes/">記録</a>
                    <a href="./creators/">活動者</a>
                    <a href="./about/">ブランド</a>
                    <a href="./contact/">連絡</a>
                </nav>
                <div class="brand-footer__social" aria-label="Social links"></div>
                <small>&copy; RELMUA</small>
            </div>
        </div>
    </footer>
</body>
</html>
