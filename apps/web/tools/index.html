<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RELMUAで公開している制作や運用に使う小さなツールをまとめます。">
    <meta property="og:title" content="RELMUA | Tools">
    <meta property="og:description" content="RELMUAで公開している制作や運用に使う小さなツールをまとめます。">
    <meta property="og:image" content="https://mira-tr.github.io/mira-terminal/assets/brand/og/og-tools.png">
    <meta property="og:url" content="https://mira-tr.github.io/mira-terminal/tools/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RELMUA | Tools">
    <meta name="twitter:description" content="RELMUAで公開している制作や運用に使う小さなツールをまとめます。">
    <meta name="twitter:image" content="https://mira-tr.github.io/mira-terminal/assets/brand/og/og-tools.png">
    <title>RELMUA | Tools</title>
    <link rel="icon" type="image/png" href="../assets/brand/icon.png">
    <link rel="apple-touch-icon" href="../assets/brand/icon.png">
    <script src="../js/theme.js"></script>
    <link rel="stylesheet" href="../trpg/css/style.css">
    <link rel="stylesheet" href="../css/brand/index.css">
    <link rel="stylesheet" href="./css/tools.css">
</head>

<body class="brand-page">
    <header class="site-header brand-header">
        <div class="site-header-inner">
            <div>
                <a class="site-logo-link" href="../" aria-label="Home">
                    <img class="site-logo" src="../assets/brand/logo.png" alt="RELMUA">
                </a>
            </div>
            <nav class="header-nav" aria-label="主要ページ">
                <a class="nav-item" href="../">ホーム</a>
                <a class="nav-item" href="../projects/">作品</a>
                <a class="nav-item is-current" href="./" aria-current="page">道具</a>
                <a class="nav-item" href="../notes/">記録</a>
                <a class="nav-item" href="../about/">ブランド</a>
                <a class="nav-item" href="../contact/">連絡</a>
            </nav>
        </div>
    </header>

    <main class="page brand-main tools-page">
        <section class="brand-page-heading" aria-labelledby="brandPageTitle">
            <p class="section-label">道具</p>
            <h1 id="brandPageTitle">道具</h1>
            <p>制作、検証、整理を少し軽くするための小さな実用ツールをまとめます。</p>
        </section>

        <section class="tools-filter-section" aria-labelledby="toolsFilterTitle">
            <div class="tools-section-header">
                <p class="section-label">分類</p>
                <h2 id="toolsFilterTitle">用途の目安</h2>
            </div>
            <div id="toolsCategoryRail" class="tools-category-rail" aria-label="道具の分類">
                <span class="tools-category-label">すべて</span>
            </div>
        </section>

        <section class="tools-list-section" aria-labelledby="toolsTitle">
            <div class="tools-section-header">
                <p class="section-label">公開中</p>
                <h2 id="toolsTitle">Tool Grid</h2>
            </div>
            <div id="toolsList" class="tool-grid" aria-live="polite">
                <div class="tools-empty-state" role="status">
                    <p class="section-label">道具</p>
                    <h3>道具を読み込んでいます</h3>
                    <p>公開中の道具を準備しています。</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer brand-footer">
        <div class="brand-footer__inner">
            <div>
                <p class="brand-footer__title">RELMUA</p>
                <p class="brand-footer__description">RELMUAの作品、道具、記録、活動者を整理して届けます。</p>
            </div>
            <div class="brand-footer__links">
                <nav class="brand-footer__nav" aria-label="フッターナビゲーション">
                    <a href="../projects/">作品</a>
                    <a href="../tools/">道具</a>
                    <a href="../notes/">記録</a>
                    <a href="../about/">ブランド</a>
                    <a href="../contact/">連絡</a>
                </nav>
                <div class="brand-footer__social" aria-label="Social links"></div>
                <small>&copy; RELMUA</small>
            </div>
        </div>
    </footer>
    <script type="module" src="./js/tools.js"></script>
</body>
</html>
