<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MIRA Terminal | TRPG</title>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="site-header">
        <div class="site-header-inner">
            <div>
                <p class="site-label">MIRA Terminal</p>
                <h1>TRPG Scenario Library</h1>
                <p class="site-lead">
                    所持・おすすめTRPGシナリオを検索できます。
                </p>
            </div>
        </div>
    </header>

    <main class="page">
        <section class="search-panel" aria-labelledby="searchTitle">
            <div class="section-head">
                <div>
                    <p class="section-label">Search</p>
                    <h2 id="searchTitle">シナリオ検索</h2>
                </div>

                <button id="resetFilterBtn" class="button button-ghost" type="button" disabled>
                    条件リセット
                </button>
            </div>

            <div class="filter-grid">
                <label class="field">
                    <span>キーワード</span>
                    <input
                        id="keywordInput"
                        type="search"
                        placeholder="タイトル・作者・タグなど"
                        autocomplete="off"
                    >
                </label>

                <label class="field">
                    <span>システム</span>
                    <select id="systemSelect">
                        <option value="">すべて</option>
                    </select>
                </label>

                <label class="field">
                    <span>人数</span>
                    <select id="playersSelect">
                        <option value="">指定なし</option>
                    </select>
                </label>

                <label class="field">
                    <span>時間</span>
                    <select id="timeSelect">
                        <option value="">指定なし</option>
                    </select>
                </label>

                <label class="field">
                    <span>年齢区分</span>
                    <select id="ratingSelect">
                        <option value="">すべて</option>
                        <option value="all">全年齢</option>
                        <option value="r18">R18</option>
                        <option value="r18g">R18G</option>
                    </select>
                </label>

                <label class="field">
                    <span>並び替え</span>
                    <select id="sortSelect">
                        <option value="recommended">おすすめ優先</option>
                        <option value="title">名前順</option>
                        <option value="author">作者順</option>
                        <option value="timeAsc">時間が短い順</option>
                        <option value="timeDesc">時間が長い順</option>
                        <option value="playersAsc">人数が少ない順</option>
                    </select>
                </label>

                <label class="field field-checkbox">
                    <span>お気に入り</span>
                    <label class="checkbox-line">
                        <input id="favoriteOnlyInput" type="checkbox">
                        <span>お気に入りのみ</span>
                    </label>
                </label>
            </div>

            <div class="tag-filter-area">
                <div class="tag-filter-head">
                    <span>タグ</span>
                    <button id="clearTagBtn" class="text-button" type="button" disabled>
                        タグ解除
                    </button>
                </div>

                <div id="tagFilter" class="tag-filter" aria-label="タグで絞り込み"></div>
            </div>

            <div
                id="activeFilters"
                class="active-filters"
                aria-label="適用中の検索条件"
                hidden
            ></div>
        </section>

        <section class="result-section" aria-labelledby="resultTitle">
            <div class="section-head">
                <div>
                    <p class="section-label">Result</p>
                    <h2 id="resultTitle">検索結果</h2>
                </div>

                <p id="resultCount" class="result-count">0件</p>
            </div>

            <div id="scenarioList" class="scenario-list"></div>

            <div class="load-more-area">
                <button id="loadMoreBtn" class="button button-ghost load-more-button" type="button">
                    もっと見る
                </button>
            </div>
        </section>
    </main>

    <div id="scenarioModal" class="modal" hidden>
        <div class="modal-backdrop" data-modal-close></div>

        <section
            class="modal-panel"
            role="dialog"
            aria-modal="true"
            aria-labelledby="modalTitle"
        >
            <div class="modal-head">
                <div>
                    <p class="section-label">Detail</p>
                    <h2 id="modalTitle">シナリオ詳細</h2>
                </div>

                <button id="modalCloseBtn" class="modal-close-button" type="button">
                    閉じる
                </button>
            </div>

            <div id="modalBody" class="modal-body"></div>
        </section>
    </div>

    <footer class="site-footer">
        <small>&copy; MIRA Terminal</small>
    </footer>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
