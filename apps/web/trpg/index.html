<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="千景の個人TRPG活動として、条件からシナリオを探せるScenario Libraryです。">
    <meta property="og:title" content="RELMUA | TRPG Scenario Library">
    <meta property="og:description" content="千景の個人TRPG活動として、条件からシナリオを探せるScenario Libraryです。">
    <meta property="og:image" content="https://mira-tr.github.io/mira-terminal/assets/brand/og/og-trpg.svg">
    <meta property="og:url" content="https://mira-tr.github.io/mira-terminal/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RELMUA | TRPG Scenario Library">
    <meta name="twitter:description" content="千景の個人TRPG活動として、条件からシナリオを探せるScenario Libraryです。">
    <meta name="twitter:image" content="https://mira-tr.github.io/mira-terminal/assets/brand/og/og-trpg.svg">

    <title>RELMUA | TRPG Scenario Library</title>
    <link rel="icon" type="image/svg+xml" href="../assets/brand/relmua-icon.svg">
    <link rel="apple-touch-icon" href="../assets/brand/relmua-icon.svg">

    <script src="../js/theme.js"></script>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="../creators/css/creator-site.css">
    <link rel="stylesheet" href="../creators/chikage/chikage.css">
</head>

<body class="creator-site-page creator-site-page--chikage trpg-library-page">
    <header class="site-header global-header">
        <div class="site-header-inner">
            <div>
                <a class="site-logo-link" href="../" aria-label="Home">
                    <img class="site-logo" src="../assets/brand/relmua-logo.svg" alt="RELMUA">
                </a>
            </div>
            <nav class="header-nav" aria-label="RELMUA">
                <a class="nav-item" href="../">RELMUAへ戻る</a>
            </nav>
        </div>
    </header>
    <header class="creator-local-header">
        <div class="creator-local-header__inner">
            <a class="creator-signature" href="../creators/chikage/">千景</a>
            <nav class="creator-local-nav" aria-label="千景サイト内">
                <a href="../creators/chikage/">千景</a>
                <a href="../creators/chikage/profile/">プロフィール</a>
                <a href="../creators/chikage/works/">作品</a>
                <a href="./" aria-current="page">TRPG</a>
                <a href="../creators/chikage/contact/">連絡先</a>
            </nav>
        </div>
        <nav class="trpg-sub-nav" aria-label="TRPG">
            <a class="nav-item trpg-sub-nav-item is-current" href="./" aria-current="page">シナリオ</a>
            <a class="nav-item trpg-sub-nav-item" href="./rules/">ハウスルール</a>
        </nav>
    </header>

    <main class="page">
        <section class="trpg-library-intro" aria-labelledby="libraryIntroTitle">
            <div>
                <p class="section-label">Chikage / Scenario Library</p>
                <h1 id="libraryIntroTitle">今夜の物語を、<br>書架から選ぶ。</h1>
                <p>条件を入力する前に、まず棚を眺める。シナリオに出会うための時間も、遊びの一部として整えました。</p>
            </div>
        </section>
        <section class="search-panel" aria-labelledby="searchTitle">
            <div class="section-head">
                <div>
                    <p class="section-label">検索</p>
                    <h2 id="searchTitle">遊びたいシナリオを探す</h2>
                    <p class="search-help">タイトルは漢字・ひらがなのどちらでも検索できます。</p>
                </div>

                <div class="filter-actions">
                    <div class="filter-action-buttons">
                        <button
                            id="shareFilterBtn"
                            class="button button-ghost"
                            type="button"
                            title="検索条件をURLとしてコピーします"
                            disabled
                        >
                            条件URLをコピー
                        </button>

                        <button id="resetFilterBtn" class="button button-ghost" type="button" disabled>
                            条件リセット
                        </button>
                    </div>

                    <p
                        id="shareFilterStatus"
                        class="share-filter-status"
                        aria-live="polite"
                    ></p>
                </div>
            </div>

            <div class="filter-grid">
                <label class="field">
                    <span>キーワード</span>
                    <input
                        id="keywordInput"
                        type="search"
                        placeholder="シナリオ名・タグなど"
                        autocomplete="off"
                    >
                </label>

                <label class="field field-author">
                    <span>作者名</span>
                    <input
                        id="authorInput"
                        type="search"
                        placeholder="作者名で検索"
                        autocomplete="off"
                    >
                </label>

                <label class="field">
                    <span>システム</span>
                    <select id="systemSelect">
                        <option value="">すべて</option>
                    </select>
                </label>

                <label class="field">
                    <span>人数</span>
                    <select id="playersSelect">
                        <option value="">指定なし</option>
                    </select>
                </label>

                <label class="field">
                    <span>時間</span>
                    <select id="timeSelect">
                        <option value="">指定なし</option>
                    </select>
                </label>

                <label class="field">
                    <span>年齢区分</span>
                    <select id="ratingSelect">
                        <option value="">すべて</option>
                        <option value="all">全年齢</option>
                        <option value="r18">R18</option>
                    </select>
                </label>

                <label class="field">
                    <span>並び替え</span>
                    <select id="sortSelect">
                        <option value="recommended">おすすめ優先</option>
                        <option value="title">名前順</option>
                        <option value="author">作者順</option>
                        <option value="timeAsc">時間が短い順</option>
                        <option value="timeDesc">時間が長い順</option>
                        <option value="playersAsc">人数が少ない順</option>
                    </select>
                </label>

                <label class="field field-checkbox">
                    <span>お気に入り</span>
                    <label class="checkbox-line">
                        <input id="favoriteOnlyInput" type="checkbox">
                        <span>お気に入りのみ</span>
                    </label>
                </label>
            </div>

            <div class="tag-filter-area">
                <div class="tag-filter-head">
                    <span>タグで絞り込む</span>
                    <button id="clearTagBtn" class="text-button" type="button" disabled>
                        タグを解除
                    </button>
                </div>

                <label class="tag-search-field" for="tagSearchInput">
                    <span>タグを検索</span>
                    <input
                        id="tagSearchInput"
                        type="search"
                        placeholder="タグ名を入力"
                        autocomplete="off"
                    >
                </label>

                <div
                    id="selectedTagFilter"
                    class="selected-tag-filter"
                    aria-label="選択中のタグ"
                    hidden
                ></div>

                <div id="tagFilter" class="tag-filter" aria-label="タグで絞り込み"></div>

                <div class="tag-filter-footer">
                    <p id="tagFilterStatus" class="tag-filter-status" aria-live="polite"></p>
                    <button
                        id="toggleTagListBtn"
                        class="button button-ghost tag-filter-toggle"
                        type="button"
                        aria-controls="tagFilter"
                        aria-expanded="false"
                        hidden
                    >
                        すべてのタグを表示
                    </button>
                </div>
            </div>

            <div
                id="activeFilters"
                class="active-filters"
                aria-label="適用中の検索条件"
                hidden
            ></div>
        </section>

        <section class="result-section" aria-labelledby="resultTitle">
            <div class="section-head">
                <div>
                    <p class="section-label">結果</p>
                    <h2 id="resultTitle">見つかったシナリオ</h2>
                </div>

                <p id="resultCount" class="result-count" aria-live="polite">0件</p>
            </div>

            <div id="scenarioList" class="scenario-list"></div>

            <div class="load-more-area">
                <button id="loadMoreBtn" class="button button-ghost load-more-button" type="button">
                    もっと見る
                </button>
            </div>
        </section>
    </main>

    <div id="scenarioModal" class="modal" hidden>
        <div class="modal-backdrop" data-modal-close></div>

        <section
            class="modal-panel"
            role="dialog"
            aria-modal="true"
            aria-labelledby="modalTitle"
        >
            <div class="modal-head">
                <div>
                    <p class="section-label">詳細</p>
                    <h2 id="modalTitle">シナリオ詳細</h2>
                </div>

                <button id="modalCloseBtn" class="modal-close-button" type="button">
                    閉じる
                </button>
            </div>

            <div id="modalBody" class="modal-body"></div>
        </section>
    </div>

    <footer class="site-footer creator-footer">
        <nav class="creator-footer__links" aria-label="TRPGフッター">
            <a href="../creators/chikage/">千景</a>
            <a href="./rules/">ハウスルール</a>
            <a href="../creators/chikage/contact/">連絡先</a>
            <a href="../">RELMUA</a>
        </nav>
        <small>&copy; RELMUA / 千景</small>
    </footer>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
