<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRA Terminal Admin | Terminal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-inner">
            <div>
                <h1>MIRA Terminal</h1>
                <p>Terminal Foundation</p>
            </div>
            <nav class="header-nav" aria-label="管理モジュール">
                <a class="nav-item" href="../">Admin Hub</a>
                <a class="nav-item is-current" href="./" aria-current="page">Terminal</a>
            </nav>
        </div>
    </header>

    <main class="admin-main terminal-main">
        <section class="panel terminal-hero" aria-labelledby="terminalTitle">
            <div>
                <p class="terminal-kicker">Terminal Shell</p>
                <h2 id="terminalTitle">Workspaceから既存Adminへ接続する入口</h2>
                <p class="terminal-lead">
                    既存管理画面を移動せず、WorkspaceとModuleとして整理するためのFoundationです。
                </p>
            </div>
            <p id="terminalRegistryStatus" class="terminal-registry-status" aria-live="polite"></p>
        </section>

        <section class="panel terminal-section" aria-labelledby="workspaceRegistryTitle">
            <div class="terminal-section-head">
                <div>
                    <p class="terminal-kicker">Workspace Registry</p>
                    <h2 id="workspaceRegistryTitle">Workspaces</h2>
                </div>
                <p class="terminal-note">未実装領域はPlannedとして表示します。</p>
            </div>
            <div id="workspaceRegistryList" class="terminal-grid" aria-live="polite"></div>
        </section>

        <section class="panel terminal-section" aria-labelledby="moduleRegistryTitle">
            <div class="terminal-section-head">
                <div>
                    <p class="terminal-kicker">Module Registry</p>
                    <h2 id="moduleRegistryTitle">Modules</h2>
                </div>
                <p class="terminal-note">TRPGは完成済みModuleとして既存Adminへ接続します。</p>
            </div>
            <div id="moduleRegistryList" class="terminal-grid" aria-live="polite"></div>
        </section>
    </main>

    <script type="module" src="../js/pages/terminalPage.js"></script>
</body>
</html>
