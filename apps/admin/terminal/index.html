<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RELMUA Terminal Admin | Terminal</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-inner">
            <div>
                <h1>RELMUA Terminal</h1>
                <p>Creative Workspace</p>
            </div>
            <nav class="header-nav" aria-label="管理ナビゲーション">
                <a class="nav-item" href="../">管理Hub</a>
                <a class="nav-item is-current" href="./" aria-current="page">Terminal</a>
            </nav>
        </div>
    </header>

    <main class="admin-main terminal-main">
        <div id="terminalBreadcrumb" class="terminal-breadcrumb-container"></div>

        <section class="panel terminal-hero" aria-labelledby="terminalTitle">
            <div>
                <p class="terminal-kicker">Terminal Shell</p>
                <h2 id="terminalTitle">制作活動を支える入口</h2>
                <p class="terminal-lead">
                    Terminalは、RELMUAのブランド、活動者サイト、公開準備を迷わず行き来するための作業場です。
                    既存Admin画面は移動せず、現在の構造のまま安全につなぎます。
                </p>
            </div>
            <p id="terminalRegistryStatus" class="terminal-registry-status" aria-live="polite"></p>
        </section>

        <section class="panel terminal-section" aria-labelledby="terminalOverviewTitle">
            <div class="terminal-section-head">
                <div>
                    <p class="terminal-kicker">Overview</p>
                    <h2 id="terminalOverviewTitle">Terminal</h2>
                </div>
                <p class="terminal-note">ブランド、活動者、公開準備を責務ごとに分け、今できる操作だけを明確に表示します。</p>
            </div>
            <div id="workspaceOverviewList" class="terminal-workspace-map" aria-live="polite"></div>
        </section>

        <section class="panel terminal-section" aria-labelledby="workspaceDetailTitle">
            <div class="terminal-section-head">
                <div>
                    <p class="terminal-kicker">Details</p>
                    <h2 id="workspaceDetailTitle">Brand / 活動者</h2>
                </div>
                <p class="terminal-note">活動者サイトは、それぞれ独立したページと機能を持つ前提で扱います。</p>
            </div>
            <div id="workspaceDetailList" class="terminal-grid" aria-live="polite"></div>
        </section>
    </main>

    <script type="module" src="../js/pages/terminalPage.js"></script>
</body>
</html>
