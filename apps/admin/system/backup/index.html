<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RELMUA Terminal Admin | System Backup</title>
    <link rel="icon" type="image/svg+xml" href="../../../web/assets/brand/relmua-icon.svg">
    <script src="../../js/adminShell.js"></script>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body data-system-page="backup">
    <header class="admin-header">
        <div class="admin-header-inner">
            <div>
                <h1>System Backup</h1>
                <p>Production OS / Data Safety</p>
            </div>
            <nav class="header-nav" aria-label="Admin navigation">
                <a class="nav-item" href="../../">Terminal Hub</a>
                <a class="nav-item" href="../../terminal/">Terminal</a>
                <a class="nav-item is-current" href="../backup/" aria-current="page">System</a>
            </nav>
        </div>
    </header>
    <main class="admin-main system-main">
        <nav class="admin-breadcrumb" aria-label="Current location">
            <ol>
                <li><a href="../../terminal/">RELMUA Terminal</a></li>
                <li><a href="../../terminal/#workspace-system">System</a></li>
                <li aria-current="page">Backup</li>
            </ol>
        </nav>
        <section class="panel system-hero" aria-labelledby="systemBackupTitle">
            <div>
                <p class="system-kicker">Data Safety</p>
                <h2 id="systemBackupTitle">Backup</h2>
                <p>Create a full local backup before imports, resets, and publish preparation.</p>
            </div>
            <button id="systemBackupExport" class="button button-primary" type="button">Download Backup</button>
        </section>
        <p id="systemPageStatus" class="system-status" role="status"></p>
        <section class="panel system-section" aria-labelledby="systemBackupTargetsTitle">
            <div class="system-section-head">
                <h2 id="systemBackupTargetsTitle">Backup Targets</h2>
                <p id="systemBackupEstimate"></p>
            </div>
            <div id="systemBackupTargets" class="system-grid" aria-live="polite"></div>
        </section>
    </main>
    <script type="module" src="../../js/pages/systemPage.js"></script>
</body>
</html>
