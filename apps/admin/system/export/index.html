<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RELMUA Studio Admin | System Export</title>
    <link rel="icon" type="image/svg+xml" href="../../../web/assets/brand/relmua-icon.svg">
    <script src="../../js/adminShell.js"></script>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body data-system-page="export">
    <header class="admin-header">
        <div class="admin-header-inner">
            <div>
                <h1>System Export</h1>
                <p>Public JSON release targets</p>
            </div>
            <nav class="header-nav" aria-label="Admin navigation">
                <a class="nav-item" href="../../">Studio Hub</a>
                <a class="nav-item" href="../../../studio/">Studio</a>
                <a class="nav-item is-current" href="../export/" aria-current="page">System</a>
            </nav>
        </div>
    </header>
    <main class="admin-main system-main">
        <nav class="admin-breadcrumb" aria-label="Current location">
            <ol>
                <li><a href="../../../studio/">RELMUA Studio</a></li>
                <li><a href="../../../studio/#health">System</a></li>
                <li aria-current="page">Export</li>
            </ol>
        </nav>
        <section class="panel system-hero" aria-labelledby="systemExportTitle">
            <div>
                <p class="system-kicker">Public Export</p>
                <h2 id="systemExportTitle">Export Center</h2>
                <p>Review the Public JSON targets. Use each editor for the actual module export.</p>
            </div>
            <button id="systemExportReview" class="button button-primary" type="button">Mark Reviewed</button>
        </section>
        <p id="systemPageStatus" class="system-status" role="status"></p>
        <section class="panel system-section" aria-labelledby="systemExportTargetsTitle">
            <div class="system-section-head">
                <h2 id="systemExportTargetsTitle">Export Targets</h2>
                <p id="systemExportSummary"></p>
            </div>
            <div id="systemExportTargets" class="system-grid" aria-live="polite"></div>
        </section>
    </main>
    <script type="module" src="../../js/pages/systemPage.js"></script>
</body>
</html>
