<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MIRA Terminal Admin</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<header>

<h1>
MIRA Terminal
</h1>

<p>
Archive your worlds.
</p>


<div class="header-nav">

    <span>
        TRPG
    </span>

    <span>
        GAME
    </span>

    <span>
        TOOLS
    </span>

</div>

</header>


<main>

<section class="dashboard">

    <div class="card">
        <h3>総数</h3>
        <p id="totalCount">0</p>
    </div>

    <div class="card">
        <h3>未整理</h3>
        <p id="draftCount">0</p>
    </div>

    <div class="card">
        <h3>公開</h3>
        <p id="publicCount">0</p>
    </div>

</section>



<section class="editor">

<h2>Scenario Register</h2>


<div class="form-grid">

    <input id="title" placeholder="タイトル">

    <input id="kana" placeholder="読み仮名">


    <div class="author-box">
        <input id="author" placeholder="作者">
        <div id="authorSuggest"></div>
    </div>


    <select id="system">
        <option>CoC6</option>
        <option>CoC7</option>
        <option>エモクロア</option>
        <option>その他</option>
    </select>


</div>


<div class="row">

<input id="playersRaw" placeholder="人数表記 例:2〜4PL">

<select id="playersMin"></select>

<select id="playersMax"></select>

</div>


<div class="row">

<input id="timeRaw" placeholder="時間表記 例:6〜8h">

<select id="timeMin"></select>

<select id="timeMax"></select>

</div>


<div class="form-grid">

    <select id="loss">

        <option>
            不明
        </option>

        <option>
            なし
        </option>

        <option>
            低
        </option>

        <option>
            中
        </option>

        <option>
            高
        </option>

        <option>
            特殊
        </option>

    </select>


    <select id="rating">

        <option value="all">
            全年齢
        </option>

        <option value="r18">
            R18
        </option>

        <option value="r18g">
            R18G
        </option>

    </select>

</div>


<div class="tag-editor">
  <label>タグ</label>
  <div id="tagButtons" class="tag-buttons"></div>

  <div class="tag-add-row">
    <input id="newTagInput" placeholder="新規タグ">
    <button id="addTagBtn" type="button">追加</button>
  </div>

  <input id="tags" type="hidden">
</div>


<input id="url" placeholder="BOOTH URL">


<select id="status">

<option value="draft">
未整理
</option>

<option value="ready">
整理済み
</option>

<option value="public">
公開
</option>

<option value="private">
非公開
</option>

</select>


<textarea id="memo" placeholder="メモ"></textarea>


<div class="button-area">

<button id="saveBtn">
保存して次へ
</button>

<button id="copyBtn">
保存して複製
</button>

</div>


<p id="message"></p>

</section>



<section>

<h2>Scenario List</h2>


<input id="search" placeholder="検索">


<div class="filter-area">

    <select id="statusFilter">
        <option value="">全状態</option>
        <option value="draft">未整理</option>
        <option value="ready">整理済み</option>
        <option value="public">公開</option>
        <option value="private">非公開</option>
    </select>


    <select id="systemFilter">
        <option value="">全システム</option>
        <option value="CoC6">CoC6</option>
        <option value="CoC7">CoC7</option>
        <option value="エモクロア">エモクロア</option>
    </select>

</div>


<select id="sort">

<option value="name">
名前順
</option>

<option value="date">
登録順
</option>

</select>





<div id="scenarioList"></div>


<section class="backup-area">
    <h2>Backup</h2>

    <div class="button-area">
        <button id="exportBtn" type="button">データ出力</button>
        <button id="importBtn" type="button">データ読込</button>
    </div>

    <input id="importFile" type="file" accept=".json" hidden>
</section>

</section>


<div id="modal" class="modal hidden">

    <div class="modal-content">

        <button id="closeModal">
            ×
        </button>

        <div id="modalBody"></div>

    </div>

</div>

</main>


<script type="module" src="../js/app.js"></script>

</body>
</html>
