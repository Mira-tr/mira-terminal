<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRA Terminal Admin</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-inner">
            <div>
                <h1>MIRA Terminal</h1>
                <p>Admin Hub</p>
            </div>
            <nav class="header-nav" aria-label="管理モジュール">
                <a class="nav-item is-current" href="./" aria-current="page">Admin Hub</a>
                <a class="nav-item" href="./trpg/">TRPG Scenario</a>
                <a class="nav-item" href="./trpg/rules/">House Rules</a>
                <a class="nav-item" href="./profile/">Profile / Links</a>
                <a class="nav-item" href="./game/">Game</a>
                <a class="nav-item" href="./tools/">Tools</a>
                <a class="nav-item" href="./notes/">Notes</a>
            </nav>
        </div>
    </header>

    <main class="admin-main">
        <section class="dashboard panel" aria-label="Dashboard">
            <h2>管理モジュール</h2>

            <div class="modules-grid">
                <a class="module-card" href="./trpg/index.html">
                    <div class="module-card-inner">
                        <h3>TRPG Scenario</h3>
                        <p>シナリオ管理</p>
                        <span class="module-status">Available</span>
                    </div>
                </a>

                <a class="module-card" href="./trpg/rules/index.html">
                    <div class="module-card-inner">
                        <h3>House Rules</h3>
                        <p>ハウスルール管理</p>
                        <span class="module-status">Available</span>
                    </div>
                </a>

                <a class="module-card" href="./profile/index.html">
                    <div class="module-card-inner">
                        <h3>Profile / Links</h3>
                        <p>プロフィール・リンク管理</p>
                        <span class="module-status">Available</span>
                    </div>
                </a>

                <a class="module-card" href="./game/index.html">
                    <div class="module-card-inner">
                        <h3>Game</h3>
                        <p>ゲーム制作物管理</p>
                        <span class="module-status">Available</span>
                    </div>
                </a>

                <a class="module-card" href="./tools/index.html">
                    <div class="module-card-inner">
                        <h3>Tools</h3>
                        <p>ツール管理</p>
                        <span class="module-status">Available</span>
                    </div>
                </a>

                <a class="module-card" href="./notes/index.html">
                    <div class="module-card-inner">
                        <h3>Notes</h3>
                        <p>メモ管理</p>
                        <span class="module-status">Available</span>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <style>
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
            max-width: 1200px;
        }

        .module-card {
            display: block;
            text-decoration: none;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            background: rgba(7, 13, 26, 0.54);
            transition: border-color 0.2s, background 0.2s;
        }

        .module-card:hover {
            border-color: var(--color-accent);
            background: rgba(110, 168, 255, 0.12);
        }

        .module-card-inner {
            padding: 20px;
        }

        .module-card h3 {
            margin: 0 0 8px 0;
            color: var(--color-accent);
            font-size: 18px;
            font-weight: 800;
        }

        .module-card p {
            margin: 0 0 12px 0;
            color: var(--color-text);
            font-size: 14px;
        }

        .module-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            background: rgba(110, 168, 255, 0.18);
            color: var(--color-accent);
        }

        @media (max-width: 560px) {
            .modules-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</body>
</html>
