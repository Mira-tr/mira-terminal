<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRA Terminal Admin</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-inner">
            <div>
                <h1>MIRA Terminal</h1>
                <p>Admin Hub</p>
            </div>
            <nav class="header-nav" aria-label="管理モジュール">
                <a class="nav-item is-current" href="./" aria-current="page">Admin Hub</a>
                <a class="nav-item" href="./creators/">Creators</a>
                <a class="nav-item" href="./trpg/">TRPG Scenario</a>
                <a class="nav-item" href="./trpg/rules/">House Rules</a>
                <a class="nav-item" href="./profile/">Profile / Links</a>
                <a class="nav-item" href="./game/">Game</a>
                <a class="nav-item" href="./tools/">Tools</a>
                <a class="nav-item" href="./notes/">Notes</a>
            </nav>
        </div>
    </header>

    <main class="admin-main">
        <section class="dashboard panel dashboard-overview" aria-label="Dashboard">
            <div class="dashboard-overview-heading">
                <h2>管理モジュール</h2>
                <p class="dashboard-overview-note">localStorageの現在値を集計しています</p>
            </div>

            <div
                id="moduleDashboard"
                class="modules-grid dashboard-overview-grid"
                aria-live="polite"
            ></div>

            <section class="dashboard-backup-summary" aria-labelledby="backupSummaryTitle">
                <h3 id="backupSummaryTitle">Backup</h3>
                <p id="lastBackupExportAt">Backup日時は記録されていません</p>
            </section>
        </section>
    </main>

    <script type="module" src="./js/pages/adminDashboardPage.js"></script>
</body>
</html>
