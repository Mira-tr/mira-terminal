<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RELMUA Terminal Admin</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-header-inner">
            <div>
                <h1>RELMUA Terminal</h1>
                <p>Creative Operations</p>
            </div>
            <nav class="header-nav" aria-label="Admin navigation">
                <a class="nav-item is-current" href="./" aria-current="page">Terminal Hub</a>
                <a class="nav-item" href="./terminal/">Terminal</a>
                <a class="nav-item" href="./terminal/#workspace-brand">Brand</a>
                <a class="nav-item" href="./terminal/#workspace-creators">Creators</a>
                <a class="nav-item" href="./terminal/#workspace-system">System</a>
            </nav>
        </div>
    </header>

    <main class="admin-main">
        <nav class="admin-breadcrumb" aria-label="現在位置">
            <ol>
                <li aria-current="page">RELMUA Terminal</li>
            </ol>
        </nav>

        <section class="dashboard panel dashboard-overview" aria-label="Terminal Hub">
            <div class="dashboard-overview-heading">
                <h2>Workspace Hub</h2>
                <p class="dashboard-overview-note">
                    Admin Hubは大分類だけを表示します。個別EditorはTerminal内のBrand、Creators、Systemから開きます。
                </p>
            </div>

            <div
                id="moduleDashboard"
                class="modules-grid dashboard-overview-grid"
                aria-live="polite"
            ></div>

            <section class="dashboard-backup-summary" aria-labelledby="backupSummaryTitle">
                <h3 id="backupSummaryTitle">Backup</h3>
                <p id="lastBackupExportAt">Backup日時は未記録です</p>
            </section>
        </section>
    </main>

    <script type="module" src="./js/pages/adminDashboardPage.js"></script>
</body>
</html>
